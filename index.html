<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duoora</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inria+Serif:ital,wght@0,300;0,400;1,300;1,400&family=Inria+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#F4F0E6;overflow:hidden;}

.screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.7s ease;
}
.screen.active{opacity:1;pointer-events:all;}

/* ── INTRO ── */
#intro{
  background:
    radial-gradient(ellipse 68% 58% at 92% 98%,rgba(222,140,134,.88) 0%,transparent 56%),
    radial-gradient(ellipse 58% 52% at 46% -6%,rgba(152,186,212,.84) 0%,transparent 58%),
    radial-gradient(ellipse 50% 48% at 2% 18%,rgba(238,226,180,.9) 0%,transparent 54%),
    radial-gradient(ellipse 44% 50% at 66% 50%,rgba(212,176,186,.48) 0%,transparent 44%),
    radial-gradient(ellipse 38% 32% at 26% 74%,rgba(196,214,228,.38) 0%,transparent 40%),
    #E8E0D4;
  padding:0 40px;text-align:center;
}
.intro-logo{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:clamp(82px,11vw,128px);
  font-weight:400;letter-spacing:-0.02em;line-height:1;
  color:rgba(255,251,243,.93);
  margin-bottom:26px;
}
.intro-logo .oo{color:rgba(128,136,186,.9);}
.intro-problem{
  font-family:'Inria Serif',serif;
  font-size:clamp(19px,2.2vw,26px);
  color:#3A2C22;line-height:1.7;
  font-weight:300;
  margin-bottom:14px;
  max-width:560px;
}
.intro-sub{
  font-family:'Inria Serif',serif;
  font-size:clamp(16px,1.8vw,20px);
  color:#6A5848;line-height:1.9;
  font-weight:300;font-style:italic;
  margin-bottom:52px;max-width:480px;
}
.btn-begin{
  font-family:'Inria Serif',serif;
  font-size:17px;font-weight:400;letter-spacing:.06em;
  color:white;background:rgba(112,116,166,.9);
  border:none;border-radius:50px;
  padding:17px 68px;cursor:pointer;
  transition:opacity .2s,transform .18s;
}
.btn-begin:hover{opacity:.8;transform:translateY(-2px);}
.btn-begin:active{transform:scale(.97);}

/* ── GAME ── */
#game{
  background:#F4F0E6;
  position:fixed;inset:0;overflow:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;padding:0;
}

.game-header{
  position:absolute;top:0;left:0;right:0;
  display:flex;flex-direction:column;
  align-items:center;
  padding:0 32px;
  z-index:10;pointer-events:none;
}
.game-logo-pill{
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  padding:7px 26px 9px;
  border-radius:0 0 50px 50px;
  border:0.5px solid rgba(255,255,255,.75);
  border-top:none;
  margin-bottom:16px;
}
.game-logo-text{
  font-family:'Instrument Serif',serif;
  font-size:17px;letter-spacing:0.02em;
  color:rgba(58,44,34,.55);
}
.game-logo-text .oo-sm{color:rgba(100,108,170,.7);}
.gp-wrap{
  display:flex;flex-direction:column;
  align-items:center;gap:8px;
  width:100%;max-width:380px;
}
.gp-bar{
  display:flex;gap:5px;width:100%;
}
.gp-seg{
  flex:1;height:3px;border-radius:2px;
  background:rgba(110,100,88,.12);
  overflow:hidden;position:relative;
}
.gp-seg::after{
  content:'';
  position:absolute;top:0;left:0;bottom:0;
  width:var(--fill,0%);
  background:rgba(110,100,88,.44);
  border-radius:2px;
  transition:width .45s ease;
}
.gp-seg.done::after{
  width:100%;
  background:rgba(110,100,88,.32);
  transition:width .35s ease;
}

/* ── CARDS ── */
.cards-row{
display: flex;
  align-items: center;
  justify-content: center;
  /* Use a smaller gap on mobile, larger on desktop */
  gap: clamp(12px, 4vw, 52px); 
  width: 100%;
  max-width: 960px;
  flex: 0 1 auto;
  /* Padding ensures cards never touch the very edge of the screen */
  padding: 0 16px; 
  margin-top: clamp(80px, 10vh, 108px);
}
.card{
/* This is the magic line: it tries to be 280px but never exceeds 45% of the screen */
  width: min(280px, 45vw); 
  aspect-ratio: 600/978;
  height: auto;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  flex: 0 1 auto; /* Changed to flex-shrink: 1 so they can get smaller */
  border: 3px solid rgba(255,255,255,.95);
  box-shadow: 0 3px 10px rgba(70,52,34,.07), 0 7px 26px rgba(70,52,34,.07), 0 14px 40px rgba(70,52,34,.05);
  transition: transform .22s ease, box-shadow .22s ease, border-color .16s;
}
  
/* Hover lift only on devices that actually have hover, like laptops */
@media (hover: hover) and (pointer: fine) {
  .card:hover{
    transform:translateY(-12px);
    box-shadow:0 8px 22px rgba(70,52,34,.1),0 16px 48px rgba(70,52,34,.12),0 26px 60px rgba(70,52,34,.07);
  }

  .card.chosen{
    transform:translateY(-12px) scale(1.022);
    border-color:rgba(140,146,200,.82);
  }
}

/* Touch devices: cards animation */
@media (hover: none), (pointer: coarse) {

  /* Disable weird sticky hover on phones */
  .card:hover{
    transform:none;
    box-shadow:0 3px 10px rgba(70,52,34,.07), 0 7px 26px rgba(70,52,34,.07), 0 14px 40px rgba(70,52,34,.05);
  }

  /* Only lift WHEN tapped (chosen) */
  .card.chosen{
    transform:translateY(-12px) scale(1.022);
    border-color:rgba(140,146,200,.82);
    box-shadow:0 8px 22px rgba(70,52,34,.1),0 16px 48px rgba(70,52,34,.12),0 26px 60px rgba(70,52,34,.07);
  }
}
.card img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}

/* ── TRANSITION ── */
#transition{
  background:#F4F0E6;
  position:fixed;inset:0;overflow:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;
  padding:0 24px;text-align:center;
}
.t-orb{
  width:min(48vw,280px);height:min(48vw,280px);
  border-radius:50%;filter:blur(50px);
  opacity:0;
  animation:tOrbIn 3s ease forwards;
}
@keyframes tOrbIn{
  0%  {opacity:0;transform:scale(.12);}
  20% {opacity:.45;}
  50% {opacity:.88;transform:scale(1.05);}
  75% {opacity:.96;transform:scale(.97);}
  100%{opacity:1;transform:scale(1);}
}
.t-lbl{
  font-family:'Inria Serif',serif;
  font-size:18px;color:#7A7060;
  font-weight:300;font-style:italic;letter-spacing:.03em;
  opacity:0;animation:tLblIn 3s ease forwards;
}
@keyframes tLblIn{
  0%{opacity:0;}15%{opacity:1;}
  85%{opacity:1;}100%{opacity:.55;}
}

/* ── RESULT ── */
#result{
  background:#F4F0E6;
  overflow-y:auto;overflow-x:hidden;
  justify-content:flex-start;
  padding:48px 24px 100px;
  align-items:center;
  -webkit-overflow-scrolling:touch;
}
.r-ey{
  font-family:'Inria Serif',serif;
  font-size:13px;color:#9A8E7A;
  font-weight:300;letter-spacing:.1em;
  text-align:center;margin-bottom:18px;
  text-transform:uppercase;
}

@keyframes auraGlowPulse{
  0%,100%{filter:drop-shadow(0 0 16px var(--glow,rgba(160,160,220,.38))) drop-shadow(0 0 6px var(--glow,rgba(160,160,220,.18)));}
  50%    {filter:drop-shadow(0 0 44px var(--glow,rgba(160,160,220,.70))) drop-shadow(0 0 18px var(--glow,rgba(160,160,220,.40)));}
}
@keyframes auraReveal{
  0%  {opacity:0;transform:scale(.68);}
  60% {opacity:1;transform:scale(1.05);}
  80% {transform:scale(.98);}
  100%{opacity:1;transform:scale(1);}
}
#auraCanvas{
  display:block;
  width:min(74vw,400px);height:min(74vw,400px);
  cursor:default;
  background:transparent;
  animation:auraGlowPulse 3.5s ease-in-out infinite;
}
#auraCanvas.entering{
  animation:
    auraReveal 1.3s cubic-bezier(.22,1,.36,1) both,
    auraGlowPulse 3.5s ease-in-out 1.2s infinite;
}
.r-name{
  font-family:'Instrument Serif',serif;
  font-size:clamp(26px,4vw,40px);
  color:#2E2820;font-weight:400;
  text-align:center;letter-spacing:.01em;
  margin:24px 0 20px;
}
.r-desc{
  font-family:'Inria Serif',serif;
  font-size:clamp(16px,1.9vw,19px);
  color:#4A3E32;line-height:2.05;
  font-weight:300;text-align:center;
  max-width:600px;margin:0 auto 40px;
}
  /* paragraph spacing inside description */
.r-desc p{
  margin: 0 0 18px;
}
.r-desc p:last-child{
  margin-bottom: 0;
}
.r-btns{display:flex;flex-direction:column;align-items:center;gap:14px;}
.btn-share{
  font-family:'Inria Serif',serif;
  font-size:16px;color:white;
  background:#8088B0;border:none;
  border-radius:50px;padding:15px 52px;
  cursor:pointer;letter-spacing:.03em;
  transition:opacity .2s,transform .18s;
}
.btn-share:hover{opacity:.82;transform:translateY(-2px);}
.btn-share:active{transform:scale(.97);}
.btn-restart{
  font-family:'Inria Serif',serif;
  font-size:14px;color:#9A8E7A;
  background:transparent;border:none;
  cursor:pointer;letter-spacing:.04em;
  text-decoration:underline;text-underline-offset:3px;
  transition:opacity .2s;
}
.btn-restart:hover{opacity:.6;}

@keyframes slideUp{
  from{opacity:0;transform:translateY(24px);}
  to  {opacity:1;transform:translateY(0);}
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.rv0{animation:fadeIn  .6s ease  .1s both;}
.rv1{animation:auraReveal 1.3s cubic-bezier(.22,1,.36,1) .2s both;}
.rv2{animation:slideUp .7s cubic-bezier(.22,1,.36,1) .6s both;}
.rv3{animation:slideUp .7s cubic-bezier(.22,1,.36,1) .8s both;}
.rv4{animation:slideUp .7s cubic-bezier(.22,1,.36,1) .95s both;}
</style>
</head>
<body>

<div id="intro" class="screen active">
  <h1 class="intro-logo">Du<span class="oo">o·o</span>ra</h1>
  <p class="intro-problem">Choose how you want to be remembered.</p>
  <p class="intro-sub">Twenty pairs. Two images. Discover your aura.<br></p>
  <button class="btn-begin" onclick="startGame()">Begin</button>
</div>

<div id="game" class="screen">
  <div class="game-header">
    <div class="game-logo-pill">
      <span class="game-logo-text">Du<span class="oo-sm">o·o</span>ra</span>
    </div>
    <div class="gp-wrap">
      <div class="gp-bar">
        <div class="gp-seg" id="gs0"></div>
        <div class="gp-seg" id="gs1"></div>
        <div class="gp-seg" id="gs2"></div>
        <div class="gp-seg" id="gs3"></div>
      </div>
      </div>
  </div>
  <div id="cardsRow" class="cards-row"></div>
</div>

<div id="transition" class="screen">
  <div id="tOrb" class="t-orb"></div>
  <div class="t-lbl">Your aura, taking shape...</div>
</div>

<div id="result" class="screen">
  <div id="rEy"   class="r-ey rv0">This is your aura.</div>
  <canvas id="auraCanvas" class="rv1"></canvas>
  <div id="rName" class="r-name rv2"></div>
  <div id="rDesc" class="r-desc rv3"></div>
  <div class="r-btns rv4">
    <button class="btn-share" onclick="shareAura()">Share Your Aura</button>
    <button class="btn-restart" onclick="startGame()">&#8592; Discover again</button>
  </div>
</div>

<script>
const CARDS = [
  {ph:0,a:'moon.jpg',aw:0,as:0, b:'sun.jpg',bw:1,bs:0},
  {ph:0,a:'winter.jpg',aw:0,as:0, b:'summer.jpg',bw:1,bs:0},
  {ph:0,a:'jazz.jpg',aw:0,as:0, b:'pop.jpg',bw:1,bs:0},
  {ph:0,a:'cave.jpg',aw:0,as:0, b:'sunlight.jpg',bw:1,bs:0},
  {ph:0,a:'planet.jpg',aw:0,as:0, b:'galaxy.jpg',bw:1,bs:0},
  {ph:1,a:'hourglass.jpg',aw:0,as:0, b:'clock.jpg',bw:0,bs:1},
  {ph:1,a:'dandelion.jpg',aw:0,as:0, b:'ancient-tree.jpg',bw:0,bs:1},
  {ph:1,a:'river.jpg',aw:0,as:0, b:'still-lake.jpg',bw:0,bs:1},
  {ph:1,a:'open-window.jpg',aw:0,as:0, b:'close-door.jpg',bw:0,bs:1},
  {ph:1,a:'ash.jpg',aw:0,as:0, b:'diamond.jpg',bw:0,bs:1},
  {ph:2,a:'rocking-horse.jpg',aw:0,as:0, b:'carousel.jpg',bw:1,bs:0},
  {ph:2,a:'two-chairs.jpg',aw:0,as:0, b:'long-table.jpg',bw:1,bs:0},
  {ph:2,a:'mountain.jpg',aw:0,as:0, b:'beach.jpg',bw:1,bs:0},
  {ph:2,a:'private-show.jpg',aw:0,as:0, b:'theatre.jpg',bw:1,bs:0},
  {ph:2,a:'candle.jpg',aw:0,as:0, b:'campfire.jpg',bw:1,bs:0},
  {ph:3,a:'phone-post.jpg',aw:0,as:0, b:'album.jpg',bw:0,bs:1},
  {ph:3,a:'fork-knife.jpg',aw:0,as:0, b:'chopsticks.jpg',bw:0,bs:1},
  {ph:3,a:'taper-candle.jpg',aw:0,as:0, b:'incense.jpg',bw:0,bs:1},
  {ph:3,a:'flower-grass.jpg',aw:0,as:0, b:'flower-vase.jpg',bw:0,bs:1},
  {ph:3,a:'park.jpg',aw:0,as:0, b:'living-room.jpg',bw:0,bs:1},
];

const PROFILES = [
  {
    name:'The Radiant',
    glow:'rgba(247,195,100,.5)',
    col:['#FDFF9E','#F7C364','#E89020'],
    wMin:7,wMax:10,sMin:6,sMax:10,
    desc:'You are the kind of person who makes a room feel as though it was always meant to be shared. Your presence does not ask for attention; it quietly creates a space where people feel more alive, more at ease, more like themselves.<br>There is a warmth in you that is difficult to put into words, something people recognize more than they can explain.<br>People will remember you in rooms and the ones who love you will tell others about how it felt to be near you.'
  },
  {
    name:'The Luminous',
    glow:'rgba(255,156,220,.5)',
    col:['#FFE0F5','#FF9CDC','#F2B397'],
    wMin:7,wMax:10,sMin:0,sMax:5,
    desc:'There is a lightness in how people feel around you, as if something they were carrying has quietly been set down. You make things feel possible.<br>You see people in a way that invites them to be seen, without pressure or performance. They remember you with a kind of warmth that lingers, a gentle ache that comes from something beautiful that passed through their lives and left them changed.'
  },
  {
    name:'The Rooted',
    glow:'rgba(112,160,134,.5)',
    col:['#D5F1B9','#9CC890','#70A086'],
    wMin:4,wMax:6,sMin:6,sMax:10,
    desc:'You are someone people feel certain about. Not loud or performative, just quietly and unmistakably present. In a world that often feels uncertain, you bring a sense of steadiness that others can lean into.<br>To be loved by you is to feel like the ground beneath has finally turned solid. It\'s a kind of reassurance that is rare, and more than most people ever offer.'
  },
  {
    name:'The Transient',
    glow:'rgba(111,150,177,.5)',
    col:['#E0FAFA','#A9EEEE','#6F96B1'],
    wMin:4,wMax:6,sMin:0,sMax:5,
    desc:'You leave things better than you found them. A conversation feels softer, a season more meaningful, a new way of seeing things because you were there. Your presence lingers in quiet, unexpected ways.<br>People remember you in a song, in the warmth of the afternoon sun, in the feeling of something gentle that stayed with them. You are the grace of a moment that does not fade, something brief yet deeply felt and impossible to forget.'
  },
  {
    name:'The Tranquil',
    glow:'rgba(134,141,222,.5)',
    col:['#EAF4FF','#AEDBF3','#868DDE'],
    wMin:0,wMax:3,sMin:6,sMax:10,
    desc:'You are a kind of sanctuary people can return to. Around you, they feel calmer, not because you try to change anything, but because your stillness gently settles what feels unsettled. You do not offer quick fixes; you offer something steadier, a presence that holds even when everything else feels noisy.<br>Long after you leave, that feeling stays with them, something quiet and grounding they can return to when the world begins to move too fast.'
  },
  {
    name:'The Ethereal',
    glow:'rgba(180,180,180,.42)',
    col:['#FFFFFF','#E0E0E0','#7A7A7A'],
    wMin:0,wMax:3,sMin:0,sMax:5,
    desc:'You exist in a way others can feel but cannot fully explain. There is a rare kind of aliveness in you, as if you are more awake to the world than most. Your presence defies description, yet it leaves something behind.<br>You leave people with a silver trace, a quiet impression they return to, still trying to grasp an essence that remains just out of reach.'
  }
];

let cur=0, W=0, S=0, t0=0, auraAnim=null, currentProfile=null;

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function getProfile(){
  for(const p of PROFILES){
    if(W>=p.wMin && W<=p.wMax && S>=p.sMin && S<=p.sMax) return p;
  }
  return PROFILES[5];
}

function hexToRgb(h){
  return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
}

function lerpHex(h1,h2,t){
  const [r1,g1,b1]=hexToRgb(h1),[r2,g2,b2]=hexToRgb(h2);
  return[Math.round(r1+(r2-r1)*t),Math.round(g1+(g2-g1)*t),Math.round(b1+(b2-b1)*t)];
}

function noise3D(x,y,z){
  const n1=Math.sin(x*1.7+y*2.3+z*1.1);
  const n2=Math.sin(x*3.1-y*1.4+z*2.7+1.5);
  const n3=Math.sin(x*0.9+y*3.7-z*1.8+3.1);
  const n4=Math.sin((x-y)*2.4+z*3.8+2.3);
  return 0.5+n1*0.22+n2*0.16+n3*0.09+n4*0.03;
}

function startGame(){
  if(auraAnim){cancelAnimationFrame(auraAnim);auraAnim=null;}
  cur=0;W=0;S=0;t0=Date.now();

  for(let i=0;i<4;i++){
    const s=document.getElementById('gs'+i);
    if(s){
        s.className='gp-seg';
        s.style.setProperty('--fill','0%');
    }
  }

  ['rEy','auraCanvas','rName','rDesc'].forEach((id)=>{
    const el=document.getElementById(id);
    if(el){el.classList.remove('rv0','rv1','rv2','rv3','rv4');void el.offsetWidth;}
  });

  show('game');
  render(0);
}

function updateProgress(i){
  const ph=Math.floor(i/5);
  const within=i-(ph*5);
  for(let idx=0;idx<4;idx++){
    const seg=document.getElementById('gs'+idx);
    if(!seg) continue;
    if(idx<ph){
      seg.className='gp-seg done';
    }else if(idx===ph){
      seg.className='gp-seg';
      seg.style.setProperty('--fill',(within/5*100)+'%');
    }else{
      seg.className='gp-seg';
      seg.style.setProperty('--fill','0%');
    }
  }
}

function render(i){
  updateProgress(i);
  const c=CARDS[i];
  const row=document.getElementById('cardsRow');
  row.style.transition='none';row.style.opacity='1';row.innerHTML='';

  [{src:c.a,w:c.aw,s:c.as},{src:c.b,w:c.bw,s:c.bs}].forEach(({src,w,s})=>{
    const div=document.createElement('div');div.className='card';
    const img=document.createElement('img');img.src=src;img.alt='';img.draggable=false;
    div.appendChild(img);
    div.addEventListener('click',()=>{
      if(div.classList.contains('chosen'))return;
      div.classList.add('chosen');
      W+=w;S+=s;
      const curSeg = document.getElementById('gs'+Math.floor(i/5));
      if(curSeg) curSeg.style.setProperty('--fill',(((i%5)+1)/5*100)+'%');
      setTimeout(advance,380);
    });
    row.appendChild(div);
  });
}

function advance(){
  const row=document.getElementById('cardsRow');
  row.style.transition='opacity .28s ease';row.style.opacity='0';
  setTimeout(()=>{
    cur++;
    if(cur>=CARDS.length){doTransition();return;}
    render(cur);
    row.style.transition='opacity .38s ease';row.style.opacity='1';
  },300);
}

function doTransition(){
  const p=getProfile();currentProfile=p;
  const orb=document.getElementById('tOrb');
  const [ci,cm,co]=p.col;
  orb.style.background=`radial-gradient(circle at 42% 38%,${ci},${cm} 52%,${co})`;
  orb.style.animation='none';void orb.offsetHeight;
  orb.style.animation='tOrbIn 3s ease forwards';
  show('transition');
  setTimeout(()=>showResult(p),3000);
}

function showResult(p){
  document.getElementById('rName').textContent=p.name;
  document.getElementById('rDesc').innerHTML = p.desc;

  ['rEy','auraCanvas','rName','rDesc'].forEach((id,i)=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.classList.remove('rv0','rv1','rv2','rv3');
    void el.offsetWidth;
    el.classList.add('rv'+i);
  });
  const btns=document.querySelector('.r-btns');
  if(btns){btns.classList.remove('rv4');void btns.offsetWidth;btns.classList.add('rv4');}

  show('result');
  document.getElementById('result').scrollTop=0;
  document.getElementById('auraCanvas').style.setProperty('--glow',p.glow);

  const elapsed=Date.now()-t0;
  initAura(p,elapsed);
}

function initAura(profile,ms){
  if(auraAnim){cancelAnimationFrame(auraAnim);auraAnim=null;}
  const canvas=document.getElementById('auraCanvas');
  const sz=Math.min(400,Math.round(window.innerWidth*0.72));
  canvas.width=sz;canvas.height=sz;
  canvas.style.width=sz+'px';canvas.style.height=sz+'px';
  const ctx=canvas.getContext('2d');

  const speedMult = ms<25000?1.35:ms<65000?1.0:0.68;
  const seed = Math.random()*100;
  const radiusFactor = 0.38 + Math.random()*0.05;
  const maxR = sz * radiusFactor;

  ctx.clearRect(0,0,sz,sz);
  let t=0;
  const colors=profile.col;

  function frame(){
    ctx.clearRect(0,0,sz,sz);
    ctx.save();
    ctx.translate(sz/2,sz/2);
    ctx.rotate(t*0.06*speedMult);
    const step=maxR/58;
    for(let r=maxR;r>0;r-=step){
      const colorPos=(r/maxR)*(colors.length-1);
      const ci=Math.max(0,Math.min(colors.length-2,Math.floor(colorPos)));
      const lerp=colorPos-ci;
      const [rr,gg,bb]=lerpHex(colors[ci],colors[ci+1],lerp);
      const alphaFade=1-r/maxR;
      const alpha=Math.pow(alphaFade,1.5)*(180/255);
      if(alpha<0.004)continue;
      ctx.fillStyle=`rgba(${rr},${gg},${bb},${alpha.toFixed(3)})`;
      ctx.beginPath();
      const steps=110;
      for(let i=0;i<=steps;i++){
        const a=(i/steps)*Math.PI*2;
        const noiseVal=noise3D(Math.cos(a)*0.7,Math.sin(a)*0.7,t*0.5*speedMult + r*0.005 + seed);
        const swirl=(noiseVal-0.5)*0.14;
        const waveStrength=4+(r/maxR)*28;
        const offset=(noiseVal-0.5)*2*waveStrength;
        const x=(r+offset)*Math.cos(a+swirl);
        const y=(r+offset)*Math.sin(a+swirl);
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
    t+=0.018;
    auraAnim=requestAnimationFrame(frame);
  }
  auraAnim=requestAnimationFrame(frame);
}

  function roundRect(ctx, x, y, width, height, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}
